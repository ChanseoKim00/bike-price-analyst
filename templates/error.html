{% extends "base.html" %}
{% block content %}

<div class="main-wrap">
  <div class="main-inner">
    <h1 class="title">Bike Price Analyst</h1>
    <p class="error-msg">자전거 정보 조회에 실패하였습니다.<br>다시 시도해주세요.</p>
    <form class="input-form" action="/analyze" method="POST">
      <div class="input-row">
        <input
          type="url"
          name="url"
          class="url-input"
          value="{{ url or '' }}"
          placeholder="자전거 판매처 링크를 입력하고 분석 버튼을 눌러주세요."
          required
          autofocus
        >
        <button type="submit" class="analyze-btn">분석</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
