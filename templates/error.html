{% extends "base.html" %}
{% block content %}

<div class="loading-overlay" id="loadingOverlay">
  <p class="loading-text">AI is analyzing the price…</p>
</div>

<div class="main-wrap">
  <div class="main-inner">
    <h1 class="title">Bike Price Analyst</h1>
    <p class="error-msg">{{ message or "Could not fetch the bike data." }}</p>
    {% if hint %}
    <p class="error-hint">{{ hint }}</p>
    {% endif %}
    <form class="input-form" action="/analyze" method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="input-row">
        <input
          type="url"
          name="url"
          class="url-input"
          value="{{ url or '' }}"
          placeholder="Paste a bike retailer URL and press Analyze."
          required
          autofocus
        >
        <button type="submit" class="analyze-btn">Analyze</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.querySelector('.input-form').addEventListener('submit', function() {
    document.getElementById('loadingOverlay').classList.add('active');
    window.onbeforeunload = null;
  });
</script>

{% endblock %}
