{% extends "base.html" %}
{% block content %}

<div class="loading-overlay" id="loadingOverlay">
  <p class="loading-text">AI가 가격을 분석중입니다.</p>
</div>

<div class="main-wrap">
  <div class="main-inner">
    <h1 class="title">Bike Price Analyst</h1>
    {% if search_limit %}
    <p class="error-msg">⏳ {{ message }}</p>
    <p class="error-hint">{{ hint }}</p>
    {% else %}
    <p class="error-msg">{{ message or "자전거 정보 조회에 실패하였습니다." }}</p>
    {% if hint %}
    <p class="error-hint">{{ hint }}</p>
    {% endif %}
    {% endif %}
    <form class="input-form" action="/analyze" method="POST">
      <div class="input-row">
        <input
          type="url"
          name="url"
          class="url-input"
          value="{{ url or '' }}"
          placeholder="자전거 판매처 링크를 입력하고 분석 버튼을 눌러주세요."
          required
          autofocus
        >
        <button type="submit" class="analyze-btn">분석</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.querySelector('.input-form').addEventListener('submit', function() {
    document.getElementById('loadingOverlay').classList.add('active');
    window.onbeforeunload = null;
  });
</script>

{% endblock %}
