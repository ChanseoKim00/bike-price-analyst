<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Price Analyst</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <a href="/" class="bpa-logo">BPA</a>
  <nav class="auth-nav">
    {% if session.get('user_nickname') %}
      <span class="auth-username">{{ session['user_nickname'] }}님</span>
      {% if session.get('user_role') == 'admin' %}
        <a href="/admin" class="auth-btn auth-btn--admin">관리자</a>
      {% endif %}
      <a href="/history" class="auth-btn">내 히스토리</a>
      <a href="/logout" class="auth-btn">로그아웃</a>
    {% else %}
      <a href="/login" class="auth-btn">로그인</a>
    {% endif %}
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
