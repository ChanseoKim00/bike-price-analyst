{% extends "base.html" %}
{% block content %}

<div class="main-wrap">

    <p class="suggest-complete-sub">주신 피드백을 반영해 더 나은 서비스로 보답하겠습니다.</p>
    <a href="/" class="another-btn" style="margin-top: 0.5rem;">메인으로</a>

</div>

<script>
  // /feedback 풀 폼으로 제출한 유저도 결과 페이지 이탈 팝업 쿨타임(72h) 적용.
