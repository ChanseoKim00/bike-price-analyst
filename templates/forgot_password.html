{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">비밀번호 찾기</h1>

    <p class="auth-notice">
      가입하신 이메일을 입력하시면 비밀번호 재설정 링크를 보내드립니다.
    </p>

    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}

    <form class="auth-form" method="POST" action="/forgot-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="auth-field">
        <label class="auth-label" for="email">이메일</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          value="{{ email or '' }}"
          placeholder="you@example.com"
          required
          autofocus
        >
      </div>
      <button type="submit" class="auth-submit">재설정 메일 받기</button>
    </form>

    <p class="auth-footer">
      <a href="/login" class="auth-link">로그인 화면으로</a>
    </p>
  </div>
</div>

{% endblock %}
