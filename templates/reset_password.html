{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">

    {% if invalid %}
    <h1 class="auth-title">링크가 유효하지 않습니다</h1>
    <p class="auth-notice">
      링크가 만료되었거나 이미 사용되었습니다.<br>
      비밀번호 찾기를 다시 시도해주세요.
    </p>
    <p class="auth-footer">
      <a href="/forgot-password" class="auth-link">비밀번호 다시 찾기</a>
    </p>

    {% else %}
    <h1 class="auth-title">새 비밀번호 설정</h1>

    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}

    <form class="auth-form" method="POST" action="/reset-password/{{ token }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="auth-field">
        <label class="auth-label" for="password">새 비밀번호</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="8자 이상"
          required
          autofocus
        >
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password_confirm">비밀번호 확인</label>
        <input
          class="auth-input"
          type="password"
          id="password_confirm"
          name="password_confirm"
          placeholder="동일하게 한 번 더 입력"
          required
        >
      </div>
      <button type="submit" class="auth-submit">비밀번호 변경</button>
    </form>
    {% endif %}

  </div>
</div>

{% endblock %}
