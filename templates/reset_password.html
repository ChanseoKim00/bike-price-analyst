{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">

    {% if invalid %}
    <h1 class="auth-title">This link is no longer valid</h1>
    <p class="auth-notice">
      The link has expired or already been used.<br>
      Please request a new password reset.
    </p>
    <p class="auth-footer">
      <a href="/forgot-password" class="auth-link">Reset password again</a>
    </p>

    {% else %}
    <h1 class="auth-title">Set a new password</h1>

    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}

    <form class="auth-form" method="POST" action="/reset-password/{{ token }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="auth-field">
        <label class="auth-label" for="password">New password</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="At least 8 characters"
          required
          autofocus
        >
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password_confirm">Confirm password</label>
        <input
          class="auth-input"
          type="password"
          id="password_confirm"
          name="password_confirm"
          placeholder="Re-enter the same password"
          required
        >
      </div>
      <button type="submit" class="auth-submit">Update password</button>
    </form>
    {% endif %}

  </div>
</div>

{% endblock %}
