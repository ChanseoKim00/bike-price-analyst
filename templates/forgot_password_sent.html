{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">메일을 보냈습니다</h1>

    <p class="auth-notice">
      <strong>{{ email }}</strong> 로 비밀번호 재설정 링크를 보냈습니다.<br>
      메일을 확인하시고 <strong>30분 이내</strong>에 링크를 눌러 새 비밀번호를 설정해주세요.
    </p>

    <p class="auth-notice" style="color:#888; font-size:13px;">
      메일이 도착하지 않는다면 스팸함도 확인해주세요.<br>
      가입되지 않은 이메일의 경우 메일이 발송되지 않습니다.
    </p>

    <p class="auth-footer">
      <a href="/login" class="auth-link">로그인 화면으로</a>
    </p>
  </div>
</div>

{% endblock %}
