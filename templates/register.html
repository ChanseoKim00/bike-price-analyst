{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">회원가입</h1>

    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}

    <form class="auth-form" method="POST" action="/register">
      <div class="auth-field">
        <label class="auth-label" for="email">이메일</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          value="{{ email or '' }}"
          placeholder="you@example.com"
          required
          autofocus
        >
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">비밀번호</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="8자 이상"
          required
        >
      </div>
      <button type="submit" class="auth-submit">회원가입</button>
    </form>

    <p class="auth-footer">
      이미 계정이 있으신가요?
      <a href="/login" class="auth-link">로그인</a>
    </p>
  </div>
</div>

{% endblock %}
