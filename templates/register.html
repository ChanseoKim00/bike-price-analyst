{% extends "base.html" %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">회원가입</h1>

    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}

    <a href="/auth/google/login" class="oauth-btn oauth-btn--google">
      <svg class="oauth-btn__icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span>Google로 계속하기</span>
    </a>

    <div class="oauth-divider"><span>또는</span></div>

    <form class="auth-form" method="POST" action="/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="auth-field">
        <label class="auth-label" for="email">이메일</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          value="{{ email or '' }}"
          placeholder="you@example.com"
          required
          autofocus
        >
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">비밀번호</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="8자 이상"
          required
        >
      </div>
      <div class="auth-field">
        <label class="auth-label" for="name">이름 (실명)</label>
        <input
          class="auth-input"
          type="text"
          id="name"
          name="name"
          value="{{ name or '' }}"
          placeholder="홍길동"
          required
        >
      </div>
      <div class="auth-field">
        <label class="auth-label" for="nickname">닉네임</label>
        <input
          class="auth-input"
          type="text"
          id="nickname"
          name="nickname"
          value="{{ nickname or '' }}"
          placeholder="라이더명"
          required
        >
      </div>
      <div class="auth-field">
        <label class="auth-label" for="birth_date">생년월일</label>
        <input
          class="auth-input"
          type="date"
          id="birth_date"
          name="birth_date"
          value="{{ birth_date or '' }}"
          required
        >
      </div>
      <label class="auth-privacy">
        <input type="checkbox" name="privacy_agreed" value="1" class="auth-checkbox">
        <span>
          개인정보 수집·이용에 동의합니다.
          <span class="auth-privacy-required">(필수)</span>
        </span>
      </label>
      <button type="submit" class="auth-submit">회원가입</button>
    </form>

    <p class="auth-footer">
      이미 계정이 있으신가요?
      <a href="/login" class="auth-link">로그인</a>
    </p>
  </div>
</div>

{% endblock %}
