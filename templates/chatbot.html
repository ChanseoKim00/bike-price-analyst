<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPA 상담원</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-alt: #f9f9fb;
            --border: #e8e8ec;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --user-bubble: #6366f1;
            --user-text: #ffffff;
            --bot-bubble: #f0f0f5;
            --bot-text: #1a1a2e;
            --input-bg: #f5f5f7;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface-alt: #13131c;
            --border: #2a2a38;
            --text-primary: #f0f0f5;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --user-bubble: #6366f1;
            --user-text: #ffffff;
            --bot-bubble: #252535;
            --bot-text: #e8e8f0;
            --input-bg: #252535;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 100vh;
            width: 100vw;
            transition: background 0.3s;
        }

        .chat-container {
            background: var(--surface);
            width: 100%;
            max-width: 760px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            transition: background 0.3s;
            min-width: 0;
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            transition: background 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            transition: color 0.3s;
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
            line-height: 1;
        }

        .icon-btn:hover {
            background: var(--border);
            transform: scale(1.05);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 14px;
            padding: 40px 20px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 36px;
            opacity: 0.5;
        }

        .empty-state-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.6;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-row.user { align-items: flex-end; }
        .message-row.bot { align-items: flex-start; }

        .message {
            max-width: 78%;
            padding: 11px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            transition: background 0.3s, color 0.3s;
        }

        .message-row.user .message {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 5px;
        }

        .message-row.bot .message {
            background: var(--bot-bubble);
            color: var(--bot-text);
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0 4px 2px;
        }

        .quick-reply-btn {
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
            background: var(--surface);
            border: 1.5px solid var(--accent);
            border-radius: 999px;
            padding: 8px 14px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }

        .quick-reply-btn:hover {
            background: var(--accent);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
            background: var(--bot-bubble);
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            width: fit-content;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.2s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: flex-end;
            gap: 10px;
            transition: background 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            transition: border-color 0.2s, background 0.3s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }

        #user-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
            line-height: 1.5;
            max-height: 120px;
            overflow-y: auto;
        }

        #user-input::placeholder { color: var(--text-muted); }

        #send-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s, opacity 0.2s;
        }

        #send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        #send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .chat-footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 8px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            transition: color 0.3s, background 0.3s, border-color 0.3s;
        }

        @media (max-width: 640px) {
            .message { max-width: 85%; }
            .header { padding: 12px 14px; }
            h1 { font-size: 14px; }
            .header-subtitle { font-size: 10px; }
            .icon-btn { width: 32px; height: 32px; font-size: 14px; border-radius: 8px; }
        }

        @media (max-width: 768px) {
            #user-input { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="header-left">
                <div class="header-icon">🚲</div>
                <div>
                    <h1>BPA 상담원</h1>
                    <div class="header-subtitle">Bike Price Analyst 고객 지원</div>
                </div>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="테마 전환">🌙</button>
            </div>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="메시지를 입력하세요..." />
            </div>
            <button id="send-btn" onclick="sendMessage()" title="전송">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <footer class="chat-footer">© 2026 BPA — Bike Price Analyst</footer>
    </div>

    <script>
        const CHAT_ENDPOINT = "{{ url_for('chatbot.chat') }}";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const themeToggle = document.getElementById('theme-toggle');

        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
                e.preventDefault();
                sendMessage();
            }
        });

        function getTime() {
            return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        function removeQuickReplies() {
            const el = document.getElementById('quick-replies');
            if (el) el.remove();
        }

        function addMessage(text, role) {
            if (role === 'user') removeQuickReplies();
            const row = document.createElement('div');
            row.className = `message-row ${role}`;

            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = getTime();

            row.appendChild(msg);
            row.appendChild(time);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
            return row;
        }

        const QUICK_REPLIES = [
            { label: '유료 플랜 설명', key: 'pricing' },
            { label: 'BPA 이용 방법',  key: 'usage' },
            { label: '기타 질문',      key: 'other' },
        ];

        async function renderQuickReplies() {
            let messages;
            try {
                const res = await fetch("{{ url_for('static', filename='auto_message.json') }}", { cache: 'no-store' });
                messages = await res.json();
            } catch (err) {
                console.warn('auto_message.json 로드 실패:', err);
                return;
            }

            const row = document.createElement('div');
            row.className = 'quick-replies';
            row.id = 'quick-replies';

            QUICK_REPLIES.forEach(({ label, key }) => {
                const text = messages[key];
                if (!text) return;
                const btn = document.createElement('button');
                btn.className = 'quick-reply-btn';
                btn.type = 'button';
                btn.textContent = label;
                btn.addEventListener('click', () => {
                    removeQuickReplies();
                    sendMessageText(text);
                });
                row.appendChild(btn);
            });

            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const row = document.createElement('div');
            row.className = 'message-row bot';
            row.id = 'typing-row';
            row.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-row');
            if (el) el.remove();
        }

        async function sendMessageText(message) {
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch(CHAT_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                removeTyping();
                addMessage(data.reply || data.error || '응답을 받지 못했습니다.', 'bot');
            } catch (err) {
                removeTyping();
                addMessage('일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'bot');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function sendMessage() {
            const message = userInput.value.trim();
            if (message) sendMessageText(message);
        }

        addMessage('안녕하세요! BPA 상담원입니다.\n앱 사용법이나 요금제에 대해 무엇이든 편하게 물어봐 주세요.', 'bot');
        renderQuickReplies();
        userInput.focus();
    </script>
</body>
</html>
